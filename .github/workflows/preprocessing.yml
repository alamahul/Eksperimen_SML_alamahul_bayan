name: Automate Data Preprocessing

# Workflow ini akan berjalan secara otomatis setiap kali ada 'push' ke branch 'main'
# 'workflow_dispatch' ditambahkan agar Anda juga bisa menjalankannya secara manual dari GitHub
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil kode dan file dari repositori Anda
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Menyiapkan environment Python di server GitHub
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Bisa disesuaikan dengan versi Python Anda

      # 3. Menginstal library yang dibutuhkan oleh skrip Anda
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas
          # Jika di skrip Anda ada library lain (misal: scikit-learn), tambahkan di bawah ini:
          # pip install scikit-learn

      # 4. Menjalankan skrip Python otomatisasi yang sudah Anda buat
      - name: Run preprocessing script
        run: |
          python preprocessing/automate_alamahul_bayan.py

      # 5. Menyimpan dan mengirim (Push) dataset bersih kembali ke repositori
      - name: Commit and push clean dataset
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          
          # Mendaftarkan file dataset bersih untuk di-commit
          git add preprocessing/dataset_clean.csv
          
          # Mengecek apakah ada perubahan data. Jika ada, lakukan commit dan push.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update clean dataset via GitHub Actions" && git push)